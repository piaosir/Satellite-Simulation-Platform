<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>雨衰计算</title>
    <!-- 主题预置：在 CSS/JS 加载前写好 data-theme，避免深色主题启动白闪（与 stores/theme.js 逻辑一致） -->
    <script>
      try {
        var m = localStorage.getItem('ui-theme')
        var dark = m === 'dark' || (m === 'system' && matchMedia('(prefers-color-scheme: dark)').matches)
        document.documentElement.dataset.theme = dark ? 'dark' : 'light'
        if (dark) document.documentElement.style.background = '#1c1c1a'
      } catch (e) { /* ignore */ }
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/rain.js"></script>
  </body>
</html>
